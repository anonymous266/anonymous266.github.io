<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.7;
      color: #2c3e50;
      background: #fafbfc;
    }

    /* ===== Layout ===== */
    .hero, section, footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ===== Hero ===== */
    .hero {
      text-align: center;
      padding: 60px 24px 36px;
    }
    .hero h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #6c757d;
      font-style: italic;
    }

    /* ===== Sections ===== */
    section {
      margin-bottom: 48px;
    }
    section h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      border-bottom: 3px solid #4361ee;
      padding-bottom: 8px;
      margin-bottom: 20px;
    }
    .section-desc {
      color: #555;
      margin-bottom: 24px;
    }

    /* ===== Abstract ===== */
    .abstract p {
      text-align: justify;
      color: #444;
      background: #fff;
      padding: 20px 24px;
      border-left: 4px solid #4361ee;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ===== Method Figure ===== */
    .figure-container {
      text-align: center;
      margin: 16px 0;
    }
    .method-figure {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* ===== Group Titles ===== */
    .group-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-top: 36px;
      margin-bottom: 6px;
      padding-left: 12px;
      border-left: 4px solid #4361ee;
    }
    .group-desc {
      color: #777;
      font-size: 0.9rem;
      margin-bottom: 16px;
      padding-left: 16px;
    }

    /* ===== Language Blocks ===== */
    .lang-block {
      margin-bottom: 24px;
    }
    .lang-block h4 {
      font-size: 1.05rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .transcription {
      background: #f0f2f5;
      border-left: 3px solid #4361ee;
      padding: 8px 14px;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: #333;
      line-height: 1.5;
      border-radius: 0 4px 4px 0;
      font-style: italic;
    }
    .transcription strong {
      font-style: normal;
      color: #4361ee;
      font-size: 0.75rem;
      text-transform: uppercase;
      margin-right: 6px;
    }

    /* ===== Audio Table ===== */
    .audio-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .audio-table thead {
      background: #4361ee;
      color: #fff;
    }
    .audio-table th {
      padding: 10px 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
    }
    .audio-table td {
      padding: 10px 8px;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    .audio-table tbody tr:hover {
      background: #f8f9ff;
    }
    audio {
      width: 150px;
      height: 36px;
    }

    /* ===== Nav Buttons ===== */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .nav-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #4361ee;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 6px rgba(67,97,238,0.3);
    }
    .nav-btn:hover {
      background: #3451d1;
      transform: translateY(-1px);
    }
    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: #4361ee;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .back-link:hover { text-decoration: underline; }

    /* ===== Content Prose (subpages) ===== */
    .prose { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .prose h2 {
      font-size: 1.5rem; font-weight: 700; color: #1a1a2e;
      border-bottom: 3px solid #4361ee; padding-bottom: 8px; margin-bottom: 20px; margin-top: 40px;
    }
    .prose h3 { font-size: 1.15rem; font-weight: 700; color: #333; margin: 24px 0 10px; }
    .prose p { color: #444; margin-bottom: 14px; text-align: justify; line-height: 1.75; }
    .prose strong { color: #1a1a2e; }

    /* ===== Figure Grid ===== */
    .figure-grid {
      display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin: 20px 0 8px;
    }
    .figure-grid figure {
      flex: 1; min-width: 280px; max-width: 480px; text-align: center;
    }
    .figure-grid img {
      width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .figure-grid figcaption, .figure-caption {
      font-size: 0.85rem; color: #666; margin-top: 8px; font-style: italic;
    }
    .figure-caption { text-align: center; margin-bottom: 20px; }

    /* ===== Data Table (for model & dataset tables) ===== */
    .data-table {
      width: 100%; border-collapse: collapse; background: #fff;
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin: 16px 0 8px;
      font-size: 0.85rem;
    }
    .data-table thead { background: #2d3436; color: #fff; }
    .data-table th {
      padding: 10px 12px; font-weight: 600; text-align: center; white-space: nowrap;
    }
    .data-table td {
      padding: 7px 10px; text-align: center; border-bottom: 1px solid #f0f0f0;
    }
    .data-table tbody tr:hover { background: #f8f9ff; }
    .data-table td:first-child { text-align: left; font-weight: 500; }
    .table-caption {
      font-size: 0.85rem; color: #666; font-style: italic; text-align: center; margin-bottom: 20px;
    }

    /* ===== Dataset 3-col table ===== */
    .dataset-table {
      width: 100%; border-collapse: collapse; background: #fff;
      font-size: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin: 16px 0 8px;
      table-layout: fixed;
    }
    .dataset-table thead { background: #2d3436; color: #fff; }
    .dataset-table th { padding: 8px 6px; font-weight: 600; text-align: center; font-size: 0.75rem; overflow: hidden; }
    .dataset-table td { padding: 4px 6px; border-bottom: 1px solid #f0f0f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dataset-table tbody tr:hover { background: #f8f9ff; }
    .dataset-table .lang-col { text-align: left; font-weight: 500; }
    .dataset-table .code-col { text-align: center; font-family: monospace; color: #4361ee; }
    .dataset-table .num-col { text-align: right; }
    .dataset-table .divider { border-right: 2px solid #e0e0e0; }
    /* Fixed column widths for 12-column layout: (lang ~18%, code ~5%, dur ~7%, sent ~7%) × 3 */
    .dataset-table th:nth-child(1), .dataset-table td:nth-child(1),
    .dataset-table th:nth-child(5), .dataset-table td:nth-child(5),
    .dataset-table th:nth-child(9), .dataset-table td:nth-child(9) { width: 16%; }
    .dataset-table th:nth-child(2), .dataset-table td:nth-child(2),
    .dataset-table th:nth-child(6), .dataset-table td:nth-child(6),
    .dataset-table th:nth-child(10), .dataset-table td:nth-child(10) { width: 5%; }
    .dataset-table th:nth-child(3), .dataset-table td:nth-child(3),
    .dataset-table th:nth-child(7), .dataset-table td:nth-child(7),
    .dataset-table th:nth-child(11), .dataset-table td:nth-child(11) { width: 7%; }
    .dataset-table th:nth-child(4), .dataset-table td:nth-child(4),
    .dataset-table th:nth-child(8), .dataset-table td:nth-child(8),
    .dataset-table th:nth-child(12), .dataset-table td:nth-child(12) { width: 7%; }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      padding: 40px 24px;
      color: #aaa;
      font-size: 0.85rem;
      border-top: 1px solid #eee;
      margin-top: 20px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .hero h1 { font-size: 1.4rem; }
      audio { width: 120px; }
      .audio-table th, .audio-table td { padding: 8px 4px; }
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
